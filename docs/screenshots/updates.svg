    <text x="28" y="44" font-family="Segoe UI, Arial" font-size="22" font-weight="600" fill="#111827">Pending patches by severity</text>
    <rect x="32" y="82" width="320" height="28" rx="14" fill="#94a3b8"/>
    <text x="370" y="103" font-family="Segoe UI, Arial" font-size="18" fill="#334155">Unrated</text>
  </g>
  <rect x="78" y="398" width="1072" height="190" rx="14" fill="#ffffff" stroke="#d7deea"/>
  <text x="106" y="440" font-family="Segoe UI, Arial" font-size="22" font-weight="600" fill="#111827">Pending updates per machine</text>
  <line x1="106" y1="466" x2="1122" y2="466" stroke="#e5e7eb"/>
  <text x="110" y="498" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Machine</text>
  <text x="360" y="498" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Pending</text>
  <text x="520" y="498" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Critical</text>
  <text x="680" y="498" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Oldest</text>
  <text x="110" y="540" font-family="Segoe UI, Arial" font-size="16" fill="#1f2937">server-or-vm-01</text>
  <text x="360" y="540" font-family="Segoe UI, Arial" font-size="16" fill="#1f2937">1</text>
  <text x="520" y="540" font-family="Segoe UI, Arial" font-size="16" fill="#047857">0</text>
  <text x="680" y="540" font-family="Segoe UI, Arial" font-size="16" fill="#1f2937">2026-04-14</text>
