<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Updates tab</title>
  <desc id="desc">Representative screenshot of pending patch assessment data.</desc>
  <rect width="1280" height="720" fill="#f6f8fb"/>
  <rect x="40" y="36" width="1200" height="648" rx="18" fill="#ffffff" stroke="#d7deea"/>
  <text x="78" y="92" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#1f2937">Updates</text>
  <text x="78" y="128" font-family="Segoe UI, Arial" font-size="18" fill="#4b5563">Azure Update Manager patch assessment across Arc-enabled servers and Azure VMs</text>
  <g transform="translate(78 170)">
    <rect width="500" height="180" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="28" y="44" font-family="Segoe UI, Arial" font-size="22" font-weight="600" fill="#9a3412">Pending patches by classification</text>
    <circle cx="128" cy="110" r="46" fill="#f97316"/>
