<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Arc Drift Dashboard overview tab</title>
  <desc id="desc">Representative screenshot of the overview tab showing Arc machine connection state and operating system mix.</desc>
  <rect width="1280" height="720" fill="#f6f8fb"/>
  <rect x="40" y="36" width="1200" height="648" rx="18" fill="#ffffff" stroke="#d7deea"/>
  <text x="78" y="92" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#1f2937">Arc Drift Dashboard</text>
  <text x="78" y="128" font-family="Segoe UI, Arial" font-size="18" fill="#4b5563">Overview: inventory, connection state, and operating system mix</text>
  <g transform="translate(78 168)">
    <rect width="220" height="112" rx="14" fill="#e8f3ff" stroke="#9cc7f1"/>
    <text x="22" y="42" font-family="Segoe UI, Arial" font-size="16" fill="#2563eb">Total Arc machines</text>
    <text x="22" y="84" font-family="Segoe UI, Arial" font-size="42" font-weight="700" fill="#1e40af">8</text>
  </g>
  <g transform="translate(322 168)">
    <rect width="220" height="112" rx="14" fill="#ecfdf5" stroke="#86efac"/>
    <text x="22" y="42" font-family="Segoe UI, Arial" font-size="16" fill="#047857">Connected</text>
    <text x="22" y="84" font-family="Segoe UI, Arial" font-size="42" font-weight="700" fill="#065f46">5</text>
  </g>
  <g transform="translate(566 168)">
    <rect width="220" height="112" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <text x="22" y="42" font-family="Segoe UI, Arial" font-size="16" fill="#c2410c">Disconnected</text>
    <text x="22" y="84" font-family="Segoe UI, Arial" font-size="42" font-weight="700" fill="#9a3412">3</text>
  </g>
  <g transform="translate(810 168)">
    <rect width="350" height="112" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="22" y="42" font-family="Segoe UI, Arial" font-size="16" fill="#475569">OS mix</text>
    <rect x="24" y="62" width="210" height="18" rx="9" fill="#60a5fa"/>
    <rect x="234" y="62" width="70" height="18" rx="9" fill="#a78bfa"/>
    <text x="24" y="100" font-family="Segoe UI, Arial" font-size="15" fill="#334155">Windows 6</text>
    <text x="140" y="100" font-family="Segoe UI, Arial" font-size="15" fill="#334155">Linux 2</text>
  </g>
  <rect x="78" y="330" width="1082" height="280" rx="14" fill="#ffffff" stroke="#d7deea"/>
  <text x="106" y="372" font-family="Segoe UI, Arial" font-size="22" font-weight="600" fill="#111827">Machine inventory</text>
  <line x1="106" y1="398" x2="1132" y2="398" stroke="#e5e7eb"/>
  <text x="110" y="430" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Machine</text>
  <text x="380" y="430" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Status</text>
  <text x="560" y="430" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">OS</text>
  <text x="740" y="430" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#64748b">Last seen</text>
  <g font-family="Segoe UI, Arial" font-size="15" fill="#1f2937">
    <text x="110" y="470">arc-server-01</text><text x="380" y="470" fill="#047857">Connected</text><text x="560" y="470">Windows</text><text x="740" y="470">5 minutes ago</text>
    <text x="110" y="510">arc-server-02</text><text x="380" y="510" fill="#047857">Connected</text><text x="560" y="510">Linux</text><text x="740" y="510">7 minutes ago</text>
    <text x="110" y="550">arc-server-03</text><text x="380" y="550" fill="#b45309">Disconnected</text><text x="560" y="550">Windows</text><text x="740" y="550">2 hours ago</text>
  </g>
</svg>
